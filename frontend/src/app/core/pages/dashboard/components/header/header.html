<header class="p-4 flex items-center justify-between">
  <div class="flex items-center gap-2">
    @if (showBackButton) {
      <p-button
        type="button"
        icon="pi pi-arrow-left"
        variant="text"
        [rounded]="true"
        [attr.aria-label]="'common.back' | translate"
        (onClick)="goBack()"
      />
    }
    <h1 class="text-2xl font-bold">{{ currentRouteLabel | translate }}</h1>
  </div>
  <app-settings class="hidden md:block" />
</header>
